<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.jpg">
<title>Tier Test System</title>

<style>
body {
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background:linear-gradient(135deg,#0f172a,#1e293b);
 color:white;
}

.header {
 text-align:center;
 padding:30px;
 font-size:34px;
 font-weight:bold;
}

.container {
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
 gap:20px;
 padding:20px;
}

.card {
 background:rgba(30,41,59,0.85);
 padding:20px;
 border-radius:16px;
 box-shadow:0 10px 30px rgba(0,0,0,0.5);
 transition:0.3s;
}

.card:hover {
 transform:scale(1.03);
}

input,select {
 width:100%;
 padding:10px;
 margin:6px 0;
 border-radius:8px;
 border:none;
}

.button {
 width:100%;
 padding:12px;
 margin-top:10px;
 border-radius:10px;
 border:none;
 background:#38bdf8;
 font-weight:bold;
 cursor:pointer;
}

.result {
 margin-top:10px;
 font-size:18px;
 color:#38bdf8;
}
</style>
</head>

<body>

<div class="header">🏆 Tier Test System</div>

<div class="container">

<!-- PLAYER -->
<div class="card">
<h2>👤 Player</h2>
<input id="player" placeholder="Player Name">
</div>

<!-- MODE -->
<div class="card">
<h2>🎮 Mode & FT</h2>

<select id="mode">
<option value="vanilla">Vanilla</option>
<option value="diasmp">DiaSMP</option>
<option value="nethpot">NethPot</option>
<option value="mace">Mace</option>
<option value="smp">SMP</option>
<option value="cart">Cart</option>
<option value="sword">Sword</option>
<option value="uhc">UHC</option>
<option value="pot">Pot</option>
<option value="axe">Axe</option>
</select>

<select id="tierLevel">
<option value="high">LT3 felett</option>
<option value="low">LT3 alatt</option>
</select>

<button class="button" onclick="getFT()">Get FT</button>
<div id="ft" class="result"></div>
</div>

<!-- SCORE -->
<div class="card">
<h2>📊 Tester vs Player Score</h2>

<input id="testerScore" type="number" placeholder="Tester Score">
<input id="playerScore" type="number" placeholder="Player Score">

<input id="aim" type="number" placeholder="Aim (1-5)">
<input id="movement" type="number" placeholder="Movement (1-5)">
<input id="gamesense" type="number" placeholder="Gamesense (1-5)">
<input id="combo" type="number" placeholder="Combo (1-5)">

<button class="button" onclick="calculate()">Calculate</button>

<div id="tierResult" class="result"></div>
</div>

<!-- EXPORT -->
<div class="card">
<h2>📦 Export JSON</h2>
<button class="button" onclick="exportJSON()">Export</button>
<pre id="jsonOutput"></pre>
</div>

</div>

<script>

let lastData = {};

// FT SYSTEM
function getFT(){
 let mode=document.getElementById("mode").value;
 let level=document.getElementById("tierLevel").value;

 let ftMap={
  axe:["FT10","FT20"],
  sword:["FT6","FT10"],
  uhc:["FT6","FT10"],
  pot:["FT6","FT10"],
  default:["FT3","FT5"]
 };

 let ft = ftMap[mode] ? ftMap[mode][level==="low"?0:1] : ftMap.default[level==="low"?0:1];

 document.getElementById("ft").innerText="Rounds: "+ft;
}

// MATCH POINTS
function getMatchPoints(mode,playerScore,testerScore){
 let diff = playerScore - testerScore;

 if(["vanilla","diasmp","nethpot","mace","smp","cart"].includes(mode)){
  if(diff >= 2) return 5;
  if(diff === 1) return 3;
 }

 if(["sword","uhc","pot"].includes(mode)){
  if(diff >= 5) return 10;
  if(diff >= 3) return 8;
  if(diff >= 2) return 6;
  if(diff === 1) return 4;
 }

 if(mode==="axe"){
  if(diff >= 7) return 15;
  if(diff >= 5) return 12;
  if(diff >= 3) return 10;
  if(diff >= 1) return 8;
 }

 return 0;
}

// MAIN CALC
function calculate(){

 let player=document.getElementById("player").value;
 let mode=document.getElementById("mode").value;

 let testerScore=+document.getElementById("testerScore").value;
 let playerScore=+document.getElementById("playerScore").value;

 let aim=+document.getElementById("aim").value;
 let movement=+document.getElementById("movement").value;
 let gamesense=+document.getElementById("gamesense").value;
 let combo=+document.getElementById("combo").value;

 if(!player || isNaN(playerScore) || isNaN(testerScore)){
  alert("Fill everything!");
  return;
 }

 let scoreString = `${playerScore}-${testerScore}`;

 let perf = (aim+movement+gamesense+combo)/4*5;
 let match = getMatchPoints(mode,playerScore,testerScore);
 let total = perf + match;

 let tier="";

 if(total<10) tier="Tier 5";
 else if(total<15) tier="Tier 4";
 else if(total<20) tier="Tier 3";
 else if(total<25) tier="Tier 2";
 else if(total<30) tier="Tier 1";
 else tier="Tier 1+";

 lastData={
  player,
  mode,
  score: scoreString,
  raw:{playerScore,testerScore},
  performance:{aim,movement,gamesense,combo},
  matchPoints:match,
  total,
  tier
 };

 document.getElementById("tierResult").innerText =
 `Tier: ${tier} (${total.toFixed(1)} pts) | Score: ${scoreString}`;
}

// EXPORT JSON
function exportJSON(){
 document.getElementById("jsonOutput").innerText =
 JSON.stringify(lastData,null,2);
}

</script>

</body>
</html>
